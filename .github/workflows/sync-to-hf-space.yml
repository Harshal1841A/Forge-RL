name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history + LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space (NeuralHU/forge-rl)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://huggingface.co/spaces/NeuralHU/forge-rl
          git config http.https://huggingface.co.extraheader "Authorization: Bearer ${HF_TOKEN}"
          git push hf main --force-with-lease
